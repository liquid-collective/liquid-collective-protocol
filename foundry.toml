[profile.default]
solc_version = "0.8.34"
optimizer = true
# Lowered from 100 to fit RiverV1 under EIP-170 (24,576 bytes). Slight runtime
# gas tradeoff for smaller deployed bytecode.
optimizer_runs = 3
# via_ir enabled to shrink RiverV1 deployed bytecode after the AttestationValidator
# and V1.3-init-migration extractions.
via_ir = true
# Strip CBOR/IPFS metadata from the tail of every deployed contract. ~52 B per
# contract; needed to land RiverV1 under the EIP-170 limit.
bytecode_hash = "none"

# Disable optimizer for coverage so branch/line attribution for removeValidators is correct
[profile.coverage]
solc_version = "0.8.34"
optimizer = false

[rpc_endpoints]
mainnet = "${MAINNET_FORK_RPC_URL}"

[fuzz]
runs = 1500

[invariant]
runs = 128
depth = 32
fail_on_revert = false